<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DM Setter OS</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div id="view-auth" class="view">
    <div class="card">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M13 2L4.5 13.5H12L11 22L19.5 10.5H12L13 2Z" fill="#00e5ff" stroke="#00e5ff" stroke-width="1" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 class="brand-title"><span class="cyan">DM Setter</span> OS</h1>
      <p class="brand-sub">Sign in to your co-pilot</p>
      <button class="btn-google" id="btn-signin">
        <svg class="g-icon" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
      <p class="hint">Opens DM Setter OS in a new tab. Sign in there, then come back here.</p>
    </div>
  </div>

  <div id="view-main" class="view" style="display:none">
    <div class="topbar">
      <div class="logo">
        <div class="logo-icon"><svg width="12" height="12" viewBox="0 0 24 24"><path d="M13 2L4.5 13.5H12L11 22L19.5 10.5H12L13 2Z" fill="#00e5ff"/></svg></div>
        <span class="logo-text"><span class="cyan">DM Setter</span> OS</span>
      </div>
      <div class="topbar-right">
        <span class="ver" id="ver">v6</span>
        <button class="icon-btn" id="btn-open-app" title="Open app">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </button>
      </div>
    </div>
    <div class="status-row"><span class="dot" id="dot"></span><span class="status-txt" id="status-txt">Checking...</span></div>
    <div class="stats-row">
      <div class="stat"><span class="stat-n" id="s-saved">-</span><span class="stat-l">Saved</span></div>
      <div class="stat"><span class="stat-n" id="s-today">-</span><span class="stat-l">Today</span></div>
      <div class="stat"><span class="stat-n">Cloud</span><span class="stat-l">AI</span></div>
    </div>
    <div class="row-section">
      <div class="row-label">Show panel on page</div>
      <label class="toggle"><input type="checkbox" id="tog-overlay" /><span class="track"><span class="thumb"></span></span></label>
    </div>
    <div class="btn-section">
      <button class="btn-primary" id="btn-analyse" disabled>Analyse Current DM</button>
    </div>
    <div class="row-section" id="webhook-section" style="display:none">
      <div class="webhook-wrap">
        <div class="row-label" style="margin-bottom:4px">Webhook URL <span style="font-size:9px;opacity:.5">(Zapier / Make → HubSpot / Salesforce)</span></div>
        <input type="url" id="webhook-url" placeholder="https://hooks.zapier.com/..." style="width:100%;box-sizing:border-box;background:#1a1a2e;border:1px solid #333;border-radius:6px;color:#e0e0e0;padding:6px 8px;font-size:11px;margin-bottom:4px" />
        <button class="btn-save-webhook" id="btn-save-webhook" style="font-size:11px;padding:4px 10px;background:#00e5ff;color:#000;border:none;border-radius:5px;cursor:pointer;font-weight:600">Save</button>
        <span id="webhook-saved-msg" style="font-size:10px;color:#00e5ff;margin-left:6px;display:none">Saved ✓</span>
      </div>
    </div>
    <div class="row-section">
      <div class="row-label" style="cursor:pointer;color:#888;font-size:11px" id="btn-toggle-webhook">⚙ CRM Webhook Settings</div>
    </div>
    <div class="recent-section">
      <div class="recent-label">Recently Saved</div>
      <div id="recent-list"><div class="empty-msg">Nothing saved yet.</div></div>
    </div>
    <div class="footer">
      <span class="footer-email" id="footer-email"></span>
      <button class="btn-signout" id="btn-signout">Sign out</button>
    </div>
  </div>

  <div id="view-loading" class="view" style="display:none">
    <div class="spin-wrap"><div class="spin"></div></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
